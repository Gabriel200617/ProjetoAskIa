<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/color.css">
    <link rel="stylesheet" href="css/login.css" type="text/css"/>

    <title>Login - Ask.ia</title>
    
</head>
<body>
    <div class="container">
        <div class="login-card">
            <header>
                <div class="logo">
                <img src="https://img.icons8.com/ios/50/ffffff/artificial-intelligence.png" alt="Logo">
                <h1>Ask.ia</h1>
                </div>
                <h2>Bem-vindo</h2>
                <p>Entre para continuar no Ask.ia</p>
            </header>

            <form action="login" method="post">
                <div class="input-group">
                    <label for="email">Email ou Usuário</label>
                    <input type="text" name="nome" id="email" placeholder="">
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" name="senha" id="password" placeholder="">
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-entrar">Entrar</button>
            </form>

            <footer>
                <p>Ainda não tem conta? <a href="pages/cadastro.html">cadastre-se</a></p>
            </footer>
        </div>
    </div>
</body>
</html>
