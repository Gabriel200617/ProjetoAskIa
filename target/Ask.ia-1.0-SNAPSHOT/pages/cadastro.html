<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/color.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <title>Cadastro - Ask.ia</title>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <header>
                <div class="logo">
                    <img src="https://img.icons8.com/ios/50/ffffff/artificial-intelligence.png" alt="Logo">
                    <h1>Ask.ia</h1>
                </div>
                <h2>Cadastro</h2>
            </header>

            <form>
                <div class="input-group">
                    <label for="email">Informe um Email</label>
                    <input type="email" id="email">
                </div>

                <div class="input-group">
                    <label for="user">Informe o Usuário</label>
                    <input type="text" id="user">
                </div>

                <div class="input-group">
                    <label for="password">Informe a Senha</label>
                    <input type="password" id="password">
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirme a Senha</label>
                    <input type="password" id="confirm-password">
                </div>

                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>

            <footer>
                <p>Já possui um login? <a href="../index.html">Login</a></p>
            </footer>
        </div>

        <button class="btn-google">
            <img src="https://img.icons8.com/color/24/000000/google-logo.png" alt="Google">
            Logar com google
        </button>
    </div>
</body>
</html>
