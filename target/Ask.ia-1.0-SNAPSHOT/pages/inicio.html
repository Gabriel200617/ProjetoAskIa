<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/color.css">
    <link rel="stylesheet" href="../css/inicio.css">
    <title>Dashboard - Ask.ia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
    <body>
        <header class="Header">
            <div class="Logo-ask">
                <img src="https://img.icons8.com/ios/50/ffffff/artificial-intelligence.png" alt="Logo" class="img-logo">
                <h1 class="title-logo">Ask.ia</h1>
            </div>
            <div class="search-logo">
                <input type="text" name="name" placeholder="Pergunte sobre  qualquer matéria (Matemática, Português..)">
            </div>
            <div class="header-perfil">
                <a href="#" class="btn-icon"><img src="../img/do-utilizador.png" class="icon" alt="Icon de perfil"/></a>
               <a class="btn-ai">Ajudante de IA</a>
            </div>
        </header>
        <div class="main-layout">
            <nav class="sidebar">
                <ul>
                    <li class="active"><i class="fa-solid fa-house"></i> Home</li>
                    <li><i class="fa-solid fa-circle-question"></i> Suas Perguntas</li>
                    <li><i class="fa-solid fa-bookmark"></i> Salvos</li>
                    <li><i class="fa-solid fa-gear"></i> Configuração</li>
                </ul>
            </nav>
       <main class="content">
                <section class="welcome-box">
                    <h2>Bem vindo de volta (Usuário)!</h2>
                    <p>Venha resolucionar suas Duvidas !!</p>

                    <div class="tools-grid">
                        <div class="tool-card">
                            <i class="fa-solid fa-plus-minus"></i>
                            <span>Resolver equação</span>
                            <button class="btn-start">Começar</button>
                        </div>
                        <div class="tool-card">
                            <i class="fa-solid fa-magnifying-glass-plus"></i>
                            <span>Explicar conceitos</span>
                            <button class="btn-start">Começar</button>
                        </div>
                        <div class="tool-card">
                            <i class="fa-solid fa-pen-nib"></i>
                            <span>Verificar gramática</span>
                            <button class="btn-start">Começar</button>
                        </div>
                        <div class="tool-card">
                            <i class="fa-solid fa-align-left"></i>
                            <span>Resumir texto</span>
                            <button class="btn-start">Começar</button>
                        </div>
                    </div>
                </section>
            </main>
    </body>
</html>
